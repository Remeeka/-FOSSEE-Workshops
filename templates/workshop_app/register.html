{% extends 'workshop_app/base.html' %}

	{% block title %}
		Register
	{% endblock %}

{% block content %}

	<style type="text/css">
    	label.required::after {
    	content: "*";
    	color: red;
		}

		.errorlist {
      color: red;
    }
	</style>

	<div class="container">
		<br>
		<h3 class="text-center mb-4">Coordinator Registration Form</h3>
		<br>
		<form action="" method="post" class="form-layout rounded-lg border border-gray-200 bg-white p-4 shadow-sm sm:p-6">
			{% csrf_token %}
				<table class="table table-bordered form-table">
					{{ form.as_table }}
				</table>
				<div class="form-actions">
					<button class="inline-flex items-center justify-center rounded-md bg-blue-600 px-4 py-2 text-sm font-medium text-white transition hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2" type="submit">Register</button>
				</div>
		</form><br>
		<!-- Activate when Instructor registeration starts -->
		<br>
	</div>
{% endblock %}
