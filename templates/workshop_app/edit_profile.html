{% extends "workshop_app/base.html" %}

{% block title %}
	Edit Profile
{% endblock %}

{% block content %}
  <div class="container">
    <form action="{{URL_ROOT}}/edit_profile/" method="post" class="form-layout rounded-lg border border-gray-200 bg-white p-4 shadow-sm sm:p-6">
    {% csrf_token %}
        <h3 class="mb-4 text-center">Edit Profile</h3>
        <table class="table table-bordered form-table">
          {{ form.as_table }}
        </table>
      <br>
        <div class="form-actions end">
            <button class="inline-flex items-center justify-center rounded-md bg-blue-600 px-4 py-2 text-sm font-medium text-white transition hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2" type="submit">Save Profile</button>
        </div>
    </form>
  </div>
{% endblock %}
