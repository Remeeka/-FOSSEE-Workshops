{% extends "workshop_app/base.html" %}

{% block title %} Forgot Password {% endblock %}

{% block content %}
<center>
<h4 class="mb-4">Enter your registered email address to reset your password</h4>
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6 col-md-offset-6">
            <div class="card border-primary form-layout">
                <div class="card-header"><h3>Forgot Password?</h3></div>
                <div class="card-body">
                    <div class="form-group">
                        <form action="" method="post" class="text-left">
                            {% csrf_token %}
                            <div class="mb-3">
                                <label for="id_email" class="mb-1 block text-sm font-semibold text-gray-700">Email address</label>
                                {{ form.email }}
                            </div>
                            <br>
                            <button class="inline-flex items-center justify-center rounded-md bg-emerald-600 px-5 py-2.5 text-sm font-semibold text-white transition hover:bg-emerald-700 focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:ring-offset-2" type="submit">
                                Request
                            </button>
                            <a href="{% url 'workshop_app:index' %}" class="inline-flex items-center justify-center rounded-md bg-blue-600 px-5 py-2.5 text-sm font-semibold text-white no-underline transition hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2">
                                Cancel
                            </a>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</center>
{% endblock content %}
